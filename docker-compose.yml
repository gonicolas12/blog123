version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: blog-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    # Ajoutez ici vos variables d'environnement (ex: DB, JWT, etc)
    # environment:
    #   - DATABASE_URL=... 
    #   - JWT_SECRET=...
    # depends_on:
    #   - db

  frontend:
    build:
      context: ./frontend
    container_name: blog-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

# Ajoutez ici d'autres services (ex: base de données) si besoin
